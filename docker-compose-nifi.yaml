services:
    nifi:
      image: apache/nifi:2.0.0
      ports:
        - "8443:8443"
      environment:
        NIFI_WEB_HTTPS_PORT: 8443
        NIFI_WEB_HTTPS_HOST: 0.0.0.0
        NIFI_WEB_PROXY_HOST: localhost:8443
        SINGLE_USER_CREDENTIALS_USERNAME : "admin"
        SINGLE_USER_CREDENTIALS_PASSWORD : "Admin12345678"
        NIFI_PYTHON_EXTENSIONS_DIR: /opt/nifi/nifi-current/python_extensions
        # memory
        NIFI_JVM_HEAP_INIT: 2g
        NIFI_JVM_HEAP_MAX: 4g
      volumes:
        - ./nifi-conf:/opt/nifi/nifi-current/conf
        # - ./nifi/flow.json.gz:/opt/nifi/nifi-current/conf/flow.json.gz
        - ./database_repository:/opt/nifi/nifi-current/database_repository
        - ./flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
        - ./content_repository:/opt/nifi/nifi-current/content_repository
        - ./provenance_repository:/opt/nifi/nifi-current/provenance_repository
        - ./state:/opt/nifi/nifi-current/state
        - ./python_extensions:/opt/nifi/nifi-current/python_extensions
      healthcheck:
        test: ["CMD", "curl", "-k", "--fail", "https://localhost:8443/nifi-api/system-diagnostics"]
        interval: 30s
        timeout: 10s
        retries: 5  
        start_period: 60s
      restart: always

    nifi-registry:
      image: apache/nifi-registry:1.25.0
      ports:
        - "18080:18080"
      environment:
        NIFI_REGISTRY_WEB_HTTP_PORT: 18080
        NIFI_REGISTRY_WEB_HTTP_HOST: 0.0.0.0
      volumes:
      - ./nifi-registry/database:/opt/nifi-registry/nifi-registry-current/database
      - ./nifi-registry/flow_storage:/opt/nifi-registry/nifi-registry-current/flow_storage